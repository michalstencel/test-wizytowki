  <!--  Meta Analytics Add To Cart Event  -->
  <script>
  document.addEventListener('smootify:added_to_cart', (event) => {
    const {lines, cart, goToCheckout} = event.detail;
    if (window.fbq) {
        for (let line of lines) {
            const cartLine = cart.lines.nodes.find(e => e.merchandise.id == line.merchandiseId);
            if (cartLine) {
                fbq('track', 'AddToCart', {
                    content_type: "product",
                    contents: [{
                        id: line.merchandiseId.split("/").pop(),
                        quantity: line.quantity,
                        value: Number(cartLine.cost.totalAmount.amount),
                        currency: cartLine.cost.totalAmount.currencyCode
                    }]
                })
            }
        }
    }
})
</script>
  <!--  Google Analytics Add To Cart Event  -->
  <script>
  document.addEventListener('smootify:added_to_cart', (event) => {
    const {lines, cart} = event.detail;
    if (window.gtag) {
      for (let line of lines) {
        const cartLine = cart.lines.nodes.find(e => e.merchandise.id === line.merchandiseId);
        if (cartLine) {
          gtag('event', 'add_to_cart', {
            'items': [{
              'id': line.merchandiseId.split("/").pop(),
              'quantity': line.quantity,
              'price': Number(cartLine.cost.totalAmount.amount),
              'currency': cartLine.cost.totalAmount.currencyCode
            }]
          });
        }
      }
    }
  });
</script>

  <script>
$(document).ready(function() {
    let variantMap = {}; // Map variant keys to Shopify variant IDs
    let designProductIds = {}; // Map design options to Shopify product IDs
    function hidePriceElements() {
        $('.total-price, .total-price-small, .vat-price').addClass('price-hidden');
    }
    function showPriceElements() {
        $('.total-price, .total-price-small, .vat-price').removeClass('price-hidden');
    }
    function updatePrice() {
        const quantity = $('.button-variant.checked[data-group="quantity"]').data('variant');
        const addons = $('.button-variant.checked[data-group="addons"]').data('variant');
        const design = $('.button-variant.checked[data-group="design"]').data('variant');
        const key = `${quantity}-${addons}`;
        const variantId = variantMap[key] || null;
        const designProductId = designProductIds[design] || null;
        // Placeholder prices (to be replaced with Shopify API integration)
        let basePrice = 0;
        let designPrice = 0;
        const totalPrice = basePrice + designPrice;
        const vatAmount = (totalPrice * 0.23).toFixed(2);
        $('.total-price').text(`${totalPrice.toFixed(2)} zł`);
        $('.total-price-small').text(`${Math.round(totalPrice)} zł`);
        $('.vat-price').html(`Podana cena nie zawiera podatku VAT w wysokości ${vatAmount} zł<sup> 1</sup>`);
        showPriceElements();
    }
    function initializePage() {
        $('#addons-foil-options').hide();
        hidePriceElements();
        $('.button-variant').each(function() {
            const group = $(this).data('group');
            if (!$('.button-variant.checked[data-group="' + group + '"]').length) {
                $(this).addClass('checked');
            }
        });
        $('.button-variant').click(function() {
            const group = $(this).data('group');
            $('.button-variant[data-group="' + group + '"]').removeClass('checked');
            $(this).addClass('checked');
            updatePrice();
            // Updated condition to match 'hs(1+0)'
            if ($('.button-variant.checked[data-group="addons"]').data('variant') === 'hs(1+0)') {
                $('#addons-foil-options').show();
            } else {
                $('#addons-foil-options').hide();
            }
        });
        $('#button-add-to-cart').click(function() {
            const quantity = $('.button-variant.checked[data-group="quantity"]').data('variant');
            const addons = $('.button-variant.checked[data-group="addons"]').data('variant');
            const design = $('.button-variant.checked[data-group="design"]').data('variant');
            const hsColor = $('#hs-color').val();
            const key = `${quantity}-${addons}`;
            const variantId = variantMap[key] || null;
            const designProductId = designProductIds[design] || null;
            let properties = {
                'Format': $('.button-variant.checked[data-group="format"]').data('variant'),
                'Wykończenie': $('.button-variant.checked[data-group="finishing"]').data('variant'),
                'Druk': $('.button-variant.checked[data-group="print"]').data('variant'),
            };
            if (addons === 'hs(1+0)') {
                properties['Kolor hot-stampingu'] = hsColor;
            }
            let itemsToAdd = [];
            // Main product
            itemsToAdd.push({
                id: variantId,
                quantity: 1,
                properties: properties
            });
            // Design product
            if (design !== 'Własny projekt') {
                itemsToAdd.push({
                    id: designProductId,
                    quantity: 1
                });
            }
            // TODO: Implement add to cart functionality with Shopify AJAX API
            alert('Produkt został dodany do koszyka.');
        });
        updatePrice();
    }
    initializePage();
});
</script>

}

}

    opacity: 0;
    visibility: hidden;
}
